# nginx proxy address - http://172.17.0.1:59032

name: linkstack
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: linkstackorg/linkstack:latest
    container_name: linkstack-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: linkstack-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      PHP_MEMORY_LIMIT: 512M
      UPLOAD_MAX_FILESIZE: 10G
      HTTP_SERVER_NAME: ${BASE_HOST_NAME:-$HOSTNAME}
      HTTPS_SERVER_NAME: ${BASE_HOST_NAME:-$HOSTNAME}
      SERVER_ADMIN: ${APP_ADMIN_USER:-admin}@${BASE_DOMAIN_NAME:-${BASE_HOST_NAME}}
    volumes:
      - './volumes/data/linkstack:/htdocs'
    ports:
      - '172.17.0.1:59032:80'
    networks:
      - linkstack
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://linkstack-app:80'
      - 'cloudflare.hostname=linkstack.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.linkstack-app.entrypoints=http'
      - 'traefik.http.routers.linkstack-app-secure.tls=true'
      - 'traefik.http.routers.linkstack-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.linkstack-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.linkstack-app.middlewares=linkstack-app-https-redirect'
      - 'traefik.http.routers.linkstack-app-secure.entrypoints=https'
      - 'traefik.http.routers.linkstack-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.linkstack-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.linkstack-app-secure.service=linkstack-app'
      - 'traefik.http.services.linkstack-app.loadbalancer.server.port=80'

networks:
  linkstack:
    name: linkstack
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
